<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting&hellip;</title>
    <script>
      // GitHub Pages has no server-side rewrites, so client-side routes
      // (e.g. /projects) 404 on refresh/direct-link. This stashes the
      // path and bounces to index.html, which restores it below.
      sessionStorage.redirect = location.href
    </script>
    <meta http-equiv="refresh" content="0;URL='/'" />
  </head>
  <body></body>
</html>
